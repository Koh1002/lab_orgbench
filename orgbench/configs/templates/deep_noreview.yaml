name: deep_noreview
authority: deep
communication: hub
review: none
model_preset: hetero

agents:
  - name: ceo
    role: "最高経営責任者 - 全体統括"
    model: "claude-haiku-4-5-20251001"
    prompt_file: "configs/prompts/ceo.md"
    manages: [tl]
    tools: []

  - name: tl
    role: "テクニカルリード"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/tl.md"
    reports_to: [ceo]
    manages: [researcher, writer]
    tools: []

  - name: researcher
    role: "リサーチャー"
    model: "gemini/gemini-2.5-flash"
    prompt_file: "configs/prompts/researcher.md"
    reports_to: [tl]
    tools: [web_search]

  - name: writer
    role: "ライター"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/writer.md"
    reports_to: [tl]
    tools: []

flow:
  - agent: ceo
    input_from: null
    action: "テーマを分析し、調査・執筆の方針を策定してください"
    output_to: tl

  - agent: tl
    input_from: ceo
    action: "CEOの指示を具体タスクに分解してください"
    output_to: researcher

  - agent: researcher
    input_from: tl
    action: "市場調査・技術調査を実施してください。Web検索を活用してください"
    output_to: writer

  - agent: writer
    input_from: researcher
    action: "調査結果を基にビジネス提案ドラフトを作成してください"
    output_to: ceo

  # レビューなし: WriterからCEOへ直接統合
  - agent: ceo
    input_from: __all__
    action: "全報告を統合し最終提案を完成させてください"
    output_to: null

max_review_rounds: 0
