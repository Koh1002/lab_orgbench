name: homo_gpt
authority: deep
communication: hub
review: balanced
model_preset: homo_gpt

agents:
  - name: ceo
    role: "最高経営責任者 - 全体統括"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/ceo.md"
    manages: [tl]
    tools: []

  - name: tl
    role: "テクニカルリード"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/tl.md"
    reports_to: [ceo]
    manages: [researcher, writer]
    tools: []

  - name: researcher
    role: "リサーチャー"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/researcher.md"
    reports_to: [tl]
    tools: [web_search]

  - name: writer
    role: "ライター"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/writer.md"
    reports_to: [tl]
    tools: []

  - name: cfo
    role: "最高財務責任者"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/cfo.md"
    reports_to: [ceo]
    tools: []

  - name: cdo
    role: "最高技術責任者"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/cdo.md"
    reports_to: [ceo]
    tools: []

flow:
  - agent: ceo
    input_from: null
    action: "テーマを分析し、調査・執筆の方針を策定してください"
    output_to: tl

  - agent: tl
    input_from: ceo
    action: "CEOの指示を具体タスクに分解してください"
    output_to: researcher

  - agent: researcher
    input_from: tl
    action: "市場調査・技術調査を実施してください。Web検索を活用してください"
    output_to: writer

  - agent: writer
    input_from: researcher
    action: "調査結果を基にビジネス提案ドラフトを作成してください"
    output_to: cfo

  - agent: cfo
    input_from: writer
    action: "財務面をレビューしてください。「APPROVED」または修正指摘を記載"
    output_to: writer
    gate: review_gate

  - agent: cdo
    input_from: writer
    action: "技術面をレビューしてください。「APPROVED」または修正指摘を記載"
    output_to: writer
    gate: review_gate

  - agent: ceo
    input_from: __all__
    action: "全報告を統合し最終提案を完成させてください"
    output_to: null

max_review_rounds: 1
