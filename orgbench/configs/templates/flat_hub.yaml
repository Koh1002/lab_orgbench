name: flat_hub
authority: flat
communication: hub
review: balanced
model_preset: hetero

agents:
  - name: ceo
    role: "コーディネーター - 全体調整（指示権限なし）"
    model: "claude-haiku-4-5-20251001"
    prompt_file: "configs/prompts/ceo.md"
    tools: []

  - name: researcher
    role: "リサーチャー - 市場調査・技術調査"
    model: "gemini/gemini-2.5-flash"
    prompt_file: "configs/prompts/researcher.md"
    tools: [web_search]

  - name: writer
    role: "ライター - ビジネス提案の執筆"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/writer.md"
    tools: []

  - name: cfo
    role: "財務アドバイザー - 財務レビュー"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/cfo.md"
    tools: []

  - name: cdo
    role: "技術アドバイザー - 技術レビュー"
    model: "gpt-4o-mini"
    prompt_file: "configs/prompts/cdo.md"
    tools: []

flow:
  - agent: ceo
    input_from: null
    action: "テーマを分析し、チームメンバーへの調査・執筆方針を提案してください（指示ではなく提案として）"
    output_to: researcher

  - agent: researcher
    input_from: ceo
    action: "提案された方針を参考に市場調査・技術調査を実施してください。Web検索を活用してください"
    output_to: writer

  - agent: writer
    input_from: researcher
    action: "調査結果を基に、6セクション構成のビジネス提案ドラフトを作成してください"
    output_to: cfo

  - agent: cfo
    input_from: writer
    action: "ビジネス提案の財務面をレビューしてください。問題がなければ「APPROVED」、修正が必要なら具体的な指摘を記載してください"
    output_to: writer
    gate: review_gate

  - agent: cdo
    input_from: writer
    action: "ビジネス提案の技術面をレビューしてください。問題がなければ「APPROVED」、修正が必要なら具体的な指摘を記載してください"
    output_to: writer
    gate: review_gate

  - agent: ceo
    input_from: __all__
    action: "全メンバーの報告とレビュー結果を統合し、最終的なビジネス提案を完成させてください"
    output_to: null

max_review_rounds: 1
